<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:mo="https://gitee.com/aun/Timo">
<head th:replace="/common/template :: header(~{::title},~{::link},~{::style})">
    <style>
        .order-brand-summary {
            max-width: 260px;
            white-space: normal;
            word-break: break-word;
            font-size: 13px;
            line-height: 1.45;
            color: #333;
        }
        .order-list-actions a {
            margin-right: 8px;
        }
        .order-list-actions a:last-child {
            margin-right: 0;
        }
        .order-total-original {
            text-decoration: line-through;
            color: #999;
        }
        .order-total-manual {
            color: #c0392b;
            font-weight: 600;
            margin-left: 6px;
        }
        /* 报价单状态：与 TEA_QUOTE_ORDER_STATUS 码一致 */
        .quote-status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            line-height: 1.5;
            white-space: nowrap;
            color: #475569;
            background: #f1f5f9;
        }
        .quote-status-unknown {
            color: #475569;
            background: #e2e8f0;
        }
        .quote-status-s100 {
            color: #1d4ed8;
            background: #dbeafe;
        }
        .quote-status-s200 {
            color: #0f766e;
            background: #ccfbf1;
        }
        .quote-status-s300 {
            color: #6d28d9;
            background: #ede9fe;
        }
        .quote-status-s400 {
            color: #92400e;
            background: #fde68a;
        }
        .quote-status-s500 {
            color: #475569;
            background: #e2e8f0;
        }
        .quote-status-s600 {
            color: #b91c1c;
            background: #fee2e2;
        }
    </style>
</head>
<body class="timo-layout-page">
<div class="layui-card">
    <div class="layui-card-header timo-card-header">
        <span><i class="fa fa-check-square-o"></i> 报价单审核</span>
        <i class="layui-icon layui-icon-refresh refresh-btn"></i>
    </div>
    <div class="layui-card-body">
        <div class="layui-row timo-card-screen">
            <div class="layui-form pull-left layui-form-pane timo-search-box">
                <div class="layui-inline">
                    <label class="layui-form-label">报单人</label>
                    <div class="layui-input-block timo-search-status" style="width: 200px;">
                        <select name="userId" class="layui-input">
                            <option value="">全部</option>
                            <option th:each="u : ${partnerUserList}" th:value="${u.id}"
                                    th:selected="${queryParam.userId != null and queryParam.userId eq u.id}"
                                    th:text="|${u.nickname}（${u.username}）|"></option>
                        </select>
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">报单号</label>
                    <div class="layui-input-block">
                        <input type="text" name="orderNo" th:value="${queryParam.orderNo}" placeholder="支持模糊查询" autocomplete="off"
                               class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">状态</label>
                    <div class="layui-input-block timo-search-status" style="width: 160px;">
                        <select class="timo-search-select layui-input" name="status" mo:dict="TEA_QUOTE_ORDER_STATUS"
                                mo-selected="${queryParam.status}"></select>
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">订单类型</label>
                    <div class="layui-input-block timo-search-status" style="width: 140px;">
                        <select class="timo-search-select layui-input" name="type" mo:dict="TEA_QUOTE_ORDER_TYPE"
                                mo-selected="${queryParam.type}"></select>
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">快递</label>
                    <div class="layui-input-block timo-search-status" style="width: 160px;">
                        <select class="timo-search-select layui-input" name="expressCompany" mo:dict="EXPRESS_COMPANY"
                                mo-selected="${queryParam.expressCompany}"></select>
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">打款</label>
                    <div class="layui-input-block timo-search-status" style="width: 140px;">
                        <select class="timo-search-select layui-input" name="payMethod" mo:dict="PAY_METHOD"
                                mo-selected="${queryParam.payMethod}"></select>
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">人工改价</label>
                    <div class="layui-input-block timo-search-status" style="width: 120px;">
                        <select class="timo-search-select layui-input" name="manualPriceAdjust" mo:dict="YES_OR_NO"
                                mo-selected="${queryParam.manualPriceAdjust}"></select>
                    </div>
                </div>
                <div class="layui-inline">
                    <button class="layui-btn timo-search-btn">
                        <i class="fa fa-search"></i>
                    </button>
                </div>
            </div>
            <div class="pull-right screen-btn-group">
                <a class="layui-btn open-popup" data-title="代建报价单"
                   th:attr="data-url=@{/business/tea/teaQuotationOrder/quote}" data-size="max">
                    <i class="fa fa-plus"></i> 代建报价
                </a>
            </div>
        </div>

        <div class="timo-table-wrap">
            <table class="layui-table timo-table">
                <thead>
                <tr>
                    <th width="120">操作</th>
                    <th width="150">报价单号</th>
                    <th width="96">订单类型</th>
                    <th width="100">报单人</th>
                    <th width="240">报价简介</th>
                    <th width="150">快递</th>
                    <th width="96">打款方式</th>
                    <th width="96">总金额 / 元</th>
                    <th width="72">总数量</th>
                    <th width="88">状态</th>
                    <th width="88">最后操作人</th>
                    <th width="130">创建时间</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item:${list}">
                    <td class="order-list-actions">
                        <a class="open-popup" style="color: #7C3AED; font-weight: 600;" data-title="报单详情"
                           th:attr="data-url=@{'/business/tea/teaQuotationOrder/detail/'+${item.id}}" data-size="max">查看详情</a>
                        <a th:if="${item.status != null and item.status == 100}" class="ajax-get" style="color: #DC2626; font-weight: 600;"
                           data-msg="您是否确认拒绝该报价单"
                           th:href="@{/business/tea/teaQuotationOrder/audit/reject/{id}(id=${item.id})}">拒绝</a>
                        <a th:if="${item.status != null and item.status == 100}" class="open-popup" style="color: #047857; font-weight: 600;"
                           data-title="确认报价单"
                           th:attr="data-url=@{'/business/tea/teaQuotationOrder/audit/confirm/'+${item.id}}" data-size="1100,720">确认</a>
                        <a th:if="${item.status != null and item.status == 200}" class="open-popup" style="color: #B45309; font-weight: 600;"
                           data-title="验收报价单"
                           th:attr="data-url=@{'/business/tea/teaQuotationOrder/audit/accept/'+${item.id}}" data-size="1100,720">验收</a>
                        <a th:if="${item.status != null and item.status == 300}" class="ajax-get" style="color: #1D4ED8; font-weight: 600;"
                           data-msg="您是否确认已打款"
                           th:href="@{/business/tea/teaQuotationOrder/audit/pay/{id}(id=${item.id})}">打款</a>
                    </td>
                    <td th:text="${item.orderNo}"></td>
                    <td th:text="${item.type != null ? #dicts.keyValue('TEA_QUOTE_ORDER_TYPE', item.type) : '-'}"></td>
                    <td th:text="${item.userName != null ? item.userName : '-'}"></td>
                    <td class="order-brand-summary"
                        th:attr="title=${item.itemBrandSummary}"
                        th:text="${item.itemBrandSummary != null ? item.itemBrandSummary : '-'}"></td>
                    <td>
                        <span th:if="${item.expressCompany != null}"
                              th:text="${#dicts.keyValue('EXPRESS_COMPANY', item.expressCompany)}"></span>
                        <span th:if="${item.expressCompany == null}">-</span>
                        <span th:if="${item.expressNo != null and !#strings.isEmpty(item.expressNo)}">
                            <span> / </span><span th:text="${item.expressNo}"></span>
                        </span>
                    </td>
                    <td th:text="${item.payMethod != null ? #dicts.keyValue('PAY_METHOD', item.payMethod) : '-'}"></td>
                    <td>
                        <th:block th:if="${item.totalManualAdjusted}">
                            <span class="order-total-original" th:text="${item.totalAmount}"></span>
                            <span class="order-total-manual" th:text="${item.totalManualAmount}"></span>
                        </th:block>
                        <span th:unless="${item.totalManualAdjusted}" th:text="${item.totalAmount}"></span>
                    </td>
                    <td th:text="${item.totalQuantity}"></td>
                    <td>
                        <span th:if="${item.status != null}"
                              th:attr="class=|quote-status-badge quote-status-s${item.status}|"
                              th:text="${#dicts.keyValue('TEA_QUOTE_ORDER_STATUS', item.status)}"></span>
                        <span th:if="${item.status == null}" class="quote-status-badge quote-status-unknown">-</span>
                    </td>
                    <td th:text="${item.operator}"></td>
                    <td th:text="${item.createTime != null ? #dates.format(new java.util.Date(item.createTime), 'yyyy/MM/dd HH:mm:ss') : ''}"></td>
                </tr>
                </tbody>
            </table>
        </div>
        <div th:replace="/common/fragment :: page"></div>
    </div>
</div>
<script th:replace="/common/template :: script"></script>
<script type="text/javascript" th:src="@{/js/plugins/jquery-3.3.1.min.js}"></script>
</body>
</html>
