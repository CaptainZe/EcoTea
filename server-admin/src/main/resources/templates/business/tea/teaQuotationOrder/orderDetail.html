<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/common/template :: header(~{::title},~{::link},~{::style})">
    <style>
        .quote-table-wrap { overflow-x: auto; margin-top: 12px; }
        .module-card {
            border: 1px solid #ebeef5;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 12px;
            background: #fff;
        }
        .module-title { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
        .quote-total-box { text-align: right; margin-top: 12px; font-size: 16px; font-weight: 600; }
        .quote-total-box span { color: #c0392b; }
        .order-detail-meta { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #eee; }
        .order-detail-meta .meta-sep { margin: 0 8px; color: #ccc; }
        .pay-upload-preview { margin-top: 10px; }
        .pay-upload-preview img { width: 140px; height: 140px; object-fit: cover; border: 1px solid #eee; }
        .quote-readonly-input {
            padding: 9px 15px;
            min-height: 38px;
            line-height: 20px;
            border: 1px solid #e6e6e6;
            border-radius: 2px;
            background: #fafafa;
            color: #333;
            word-break: break-all;
        }
        .order-amount-original { text-decoration: line-through; color: #999; }
        .order-amount-manual { color: #c0392b; font-weight: 600; margin-left: 6px; }
    </style>
</head>
<body class="timo-layout-page">
<div class="layui-card" th:if="${errorMsg == null}">
    <div class="layui-card-header timo-card-header">
        <span><i class="fa fa-file-text-o"></i> 报单详情</span>
    </div>
    <div class="layui-card-body">
        <form class="layui-form" id="orderDetailForm">
            <div class="module-card">
                <div class="order-detail-meta">
                    <span th:text="|报单号：${order.orderNo}|"></span>
                    <span class="meta-sep">|</span>
                    <span th:text="|报单人：${order.userName != null ? order.userName : '-'}|"></span>
                    <span class="meta-sep">|</span>
                    <span th:text="|订单类型：${order.type != null ? #dicts.keyValue('TEA_QUOTE_ORDER_TYPE', order.type) : '-'}|"></span>
                    <span class="meta-sep">|</span>
                    <span th:text="|状态：${#dicts.keyValue('TEA_QUOTE_ORDER_STATUS', order.status)}|"></span>
                    <span class="meta-sep">|</span>
                    <span th:text="|创建：${order.createTime != null ? #dates.format(new java.util.Date(order.createTime), 'yyyy/MM/dd HH:mm:ss') : '-'}|"></span>
                    <span class="meta-sep">|</span>
                    <span>总金额 / 元：
                        <th:block th:if="${order.totalManualAdjusted}">
                            <span class="order-amount-original" th:text="${order.totalAmount}"></span>
                            <span class="order-amount-manual" th:text="${order.totalManualAmount}"></span>
                        </th:block>
                        <th:block th:unless="${order.totalManualAdjusted}" th:text="${order.totalAmount}"></th:block>
                    </span>
                    <span class="meta-sep">|</span>
                    <span th:text="|总数量：${order.totalQuantity}|"></span>
                </div>
                <div class="quote-table-wrap">
                    <table class="layui-table" id="quoteSkuTable">
                        <thead>
                        <tr>
                            <th width="88">品牌</th>
                            <th width="160">商品名称</th>
                            <th width="130">规格/批次</th>
                            <th width="140">外观情况</th>
                            <th width="120">提袋情况</th>
                            <th width="90">单价 / 元</th>
                            <th width="88">数量</th>
                            <th width="120">小计 / 元</th>
                            <th width="140">备注</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item:${itemList}">
                            <td th:text="${item.skuBrand}"></td>
                            <td>
                                <div th:text="${item.skuName}"></div>
                                <div style="color:#999;" th:text="${item.skuCode}"></div>
                            </td>
                            <td>
                                <div th:text="${item.skuSpec}"></div>
                                <div style="color:#999;" th:text="${item.skuProductionBatch}"></div>
                            </td>
                            <td th:text="${item.appearanceCondition != null ? #dicts.keyValue('TEA_APPEARANCE_CONDITION', item.appearanceCondition) : '-'}"></td>
                            <td th:text="${item.hasBag != null ? #dicts.keyValue('TEA_HAS_BAG', item.hasBag) : '-'}"></td>
                            <td th:text="${item.baseRecyclePrice}"></td>
                            <td th:text="${item.quantity}"></td>
                            <td>
                                <th:block th:if="${item.lineManualAdjusted}">
                                    <span class="order-amount-original" th:text="${item.amount}"></span>
                                    <span class="order-amount-manual" th:text="${item.manualAmount}"></span>
                                </th:block>
                                <span th:unless="${item.lineManualAdjusted}" th:text="${item.amount}"></span>
                            </td>
                            <td th:text="${item.manualRemark != null and !#strings.isEmpty(item.manualRemark) ? item.manualRemark : '-'}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="quote-total-box">
                    总数量：<span th:text="${order.totalQuantity}"></span>&nbsp;&nbsp;&nbsp;
                    总报价：
                    <th:block th:if="${order.totalManualAdjusted}">
                        <span class="order-amount-original" th:text="${order.totalAmount}"></span>
                        <span class="order-amount-manual" th:text="${order.totalManualAmount}"></span>
                    </th:block>
                    <span th:unless="${order.totalManualAdjusted}" th:text="${order.totalAmount}"></span>
                    元
                </div>
            </div>

            <div class="layui-row layui-col-space12">
                <div class="layui-col-md6">
                    <div class="module-card">
                        <div class="module-title">快递模块</div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">快递公司</label>
                            <div class="layui-input-block">
                                <div class="quote-readonly-input" th:text="${order.expressCompany != null ? #dicts.keyValue('EXPRESS_COMPANY', order.expressCompany) : '-'}"></div>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">快递单号</label>
                            <div class="layui-input-block">
                                <div class="quote-readonly-input" th:text="${order.expressNo != null and !#strings.isEmpty(order.expressNo) ? order.expressNo : '-'}"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="layui-col-md6">
                    <div class="module-card">
                        <div class="module-title">打款模块</div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">打款方式</label>
                            <div class="layui-input-block">
                                <div class="quote-readonly-input" th:text="${order.payMethod != null ? #dicts.keyValue('PAY_METHOD', order.payMethod) : '-'}"></div>
                            </div>
                        </div>
                        <div class="layui-form-item" th:if="${order.payMethod != null and order.payMethod == 1}">
                            <label class="layui-form-label">微信收款码</label>
                            <div class="layui-input-block">
                                <div class="pay-upload-preview" th:if="${payInfoVo.wxQrCode != null and !#strings.isEmpty(payInfoVo.wxQrCode)}">
                                    <img th:src="${payInfoVo.wxQrCode}" alt="微信收款码">
                                </div>
                                <div class="quote-readonly-input" th:if="${payInfoVo.wxQrCode == null or #strings.isEmpty(payInfoVo.wxQrCode)}">-</div>
                            </div>
                        </div>
                        <div class="layui-form-item" th:if="${order.payMethod != null and order.payMethod == 2}">
                            <label class="layui-form-label">支付宝收款码</label>
                            <div class="layui-input-block">
                                <div class="pay-upload-preview" th:if="${payInfoVo.alipayQrCode != null and !#strings.isEmpty(payInfoVo.alipayQrCode)}">
                                    <img th:src="${payInfoVo.alipayQrCode}" alt="支付宝收款码">
                                </div>
                                <div class="quote-readonly-input" th:if="${payInfoVo.alipayQrCode == null or #strings.isEmpty(payInfoVo.alipayQrCode)}">-</div>
                            </div>
                        </div>
                        <th:block th:if="${order.payMethod != null and order.payMethod == 3}">
                            <div class="layui-form-item">
                                <label class="layui-form-label">银行名</label>
                                <div class="layui-input-block">
                                    <div class="quote-readonly-input" th:text="${payInfoVo.bankName != null and !#strings.isEmpty(payInfoVo.bankName) ? payInfoVo.bankName : '-'}"></div>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">银行卡号</label>
                                <div class="layui-input-block">
                                    <div class="quote-readonly-input" th:text="${payInfoVo.bankAccount != null and !#strings.isEmpty(payInfoVo.bankAccount) ? payInfoVo.bankAccount : '-'}"></div>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">收款人名</label>
                                <div class="layui-input-block">
                                    <div class="quote-readonly-input" th:text="${payInfoVo.payeeName != null and !#strings.isEmpty(payInfoVo.payeeName) ? payInfoVo.payeeName : '-'}"></div>
                                </div>
                            </div>
                        </th:block>
                    </div>
                </div>
            </div>

            <div class="layui-form-item timo-finally" style="margin-top: 20px;">
                <button type="button" class="layui-btn btn-secondary close-popup"><i class="fa fa-times-circle"></i> 关闭</button>
            </div>
        </form>
    </div>
</div>
<div class="layui-card" th:if="${errorMsg != null}">
    <div class="layui-card-body">
        <p style="color:#c00;" th:text="${errorMsg}"></p>
    </div>
</div>
<script th:replace="/common/template :: script"></script>
</body>
</html>
