<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:mo="https://gitee.com/aun/Timo">
<head th:replace="/common/template :: header(~{::title},~{::link},~{::style})">
    <style>
        .sku-form .layui-form-label {
            width: 110px;
        }
        .sku-form .layui-input-inline {
            width: 260px;
        }
        .sku-form .layui-input-block {
            margin-left: 140px;
        }
        .upload-box {
            display: flex;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .upload-item {
            width: 120px;
            height: 120px;
            margin-right: 10px;
            margin-bottom: 10px;
            border: 1px dashed #ddd;
            position: relative;
            cursor: move;
        }
        .upload-item.dragging {
            opacity: .6;
            border-color: #5FB878;
        }
        .upload-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .delete-img {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 20px;
            height: 20px;
            line-height: 20px;
            text-align: center;
            border-radius: 50%;
            background: rgba(0, 0, 0, .6);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="layui-form timo-compile">
    <form id="editform" class="layui-form sku-form" method="POST">
        <input type="hidden" name="id" th:if="${editItem}" th:value="${editItem.id}"/>

        <div class="layui-form-item">
            <label class="layui-form-label required">商品名称</label>
            <div class="layui-input-inline">
                <input type="text" name="name" class="layui-input" th:value='${editItem?.name}' required lay-verify="required"
                       placeholder="如: 瑞泉 斑竹窠肉桂">
            </div>
            <label class="layui-form-label required">状态</label>
            <div class="layui-input-inline">
                <select class="timo-search-select" name="status" mo:dict="SKU_STATUS"
                        mo-selected="${editItem.status}" lay-verify="required"></select>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label required">品牌</label>
            <div class="layui-input-inline">
                <select class="timo-search-select" name="brand" mo:dict="TEA_BRAND"
                        mo-selected="${editItem.brand}" lay-verify="required" lay-search></select>
            </div>
            <label class="layui-form-label required">茶类</label>
            <div class="layui-input-inline">
                <select class="timo-search-select" name="type" mo:dict="TEA_TYPE"
                        mo-selected="${editItem.type}" lay-verify="required"></select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label required">等级</label>
            <div class="layui-input-inline">
                <select class="timo-search-select" name="grade" mo:dict="TEA_GRADE"
                        mo-selected="${editItem.grade}" lay-verify="required"></select>
            </div>
            <label class="layui-form-label required">规格</label>
            <div class="layui-input-inline">
                <input type="text" name="spec" class="layui-input" th:value='${editItem?.spec}'
                       placeholder="如: 30g（10g✖️3泡）">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label required">年份</label>
            <div class="layui-input-inline">
                <input type="number" name="year" class="layui-input" th:value='${editItem?.year}' required lay-verify="required">
            </div>
            <label class="layui-form-label required">生产批次</label>
            <div class="layui-input-inline">
                <input type="text" name="productionBatch" class="layui-input" th:value='${editItem?.productionBatch}'
                       placeholder="如: 2025年2月24日 或 2025年上半年">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label required">保质期</label>
            <div class="layui-input-inline">
                <select class="timo-search-select" name="expiration" mo:dict="TEA_EXPIRATION"
                        mo-selected="${editItem.expiration}" lay-verify="required"></select>
            </div>
            <label class="layui-form-label">条形码</label>
            <div class="layui-input-inline">
                <input type="text" name="barcode" class="layui-input" th:value='${editItem?.barcode}'>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label required">官方展示图</label>
            <div class="layui-input-block">
                <button type="button" class="layui-btn image-upload">
                    <i class="layui-icon">&#xe67c;</i> 上传官方展示图
                </button>
                <div class="upload-box" id="imagePreviewBox"></div>
                <input type="hidden" id="imageUrls" name="imageUrls" th:value="${editItem.imageUrls}">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label required">实物鉴定图</label>
            <div class="layui-input-block">
                <button type="button" class="layui-btn real-image-upload">
                    <i class="layui-icon">&#xe67c;</i> 上传实物鉴定图
                </button>
                <div class="upload-box" id="realImagePreviewBox"></div>
                <input type="hidden" id="realImageUrls" name="realImageUrls" th:value="${editItem.realImageUrls}">
            </div>
        </div>

        <br>
        <fieldset class="layui-elem-field layui-field-title" style="margin-top: 0px;">
            <legend>价格配置</legend>
        </fieldset>
        <br>

        <div class="layui-form-item">
            <label class="layui-form-label required">官方价(元)</label>
            <div class="layui-input-inline">
                <input type="number" step="0.01" name="officialPrice" class="layui-input" th:value='${editItem?.officialPrice}'>
            </div>

            <label class="layui-form-label required">销售价(元)</label>
            <div class="layui-input-inline">
                <input type="number" step="0.01" name="salePrice" class="layui-input" th:value='${editItem?.salePrice}' required lay-verify="required">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label required">回收价(元)</label>
            <div class="layui-input-inline">
                <input type="number" step="0.01" name="recyclePrice" class="layui-input" th:value='${editItem?.recyclePrice}' required lay-verify="required">
            </div>

            <label class="layui-form-label required">破损压价(%)</label>
            <div class="layui-input-inline">
                <input type="number" name="recyclePriceReducePer" class="layui-input" th:value='${editItem?.recyclePriceReducePer}' required lay-verify="required">
            </div>

            <label class="layui-form-label required">无提袋扣减(元)</label>
            <div class="layui-input-inline">
                <input type="number" step="0.01" name="recyclePriceReduceNoBag" class="layui-input" th:value='${editItem?.recyclePriceReduceNoBag}' required lay-verify="required">
            </div>
        </div>

        <div class="layui-form-item timo-finally">
            <button type="submit" class="layui-btn" lay-submit lay-filter="submitForm"><i class="fa fa-check-circle"></i> 保存</button>
            <button class="layui-btn btn-secondary close-popup"><i class="fa fa-times-circle"></i> 关闭</button>
        </div>
    </form>
</div>
<script th:replace="/common/template :: script"></script>
<script type="text/javascript" th:src="@{/js/plugins/jquery-3.3.1.min.js}"></script>
<script>
    layui.use(['upload', 'form'], function () {
        var upload = layui.upload;
        var form = layui.form;
        var $ = layui.jquery;
        var draggingEl = null;
        var imageList = [];
        var realImageList = [];

        initImageGroup({
            uploadElem: '.image-upload',
            inputId: '#imageUrls',
            boxId: '#imagePreviewBox',
            imageListRef: function () { return imageList; },
            setImageList: function (list) { imageList = list; }
        });
        initImageGroup({
            uploadElem: '.real-image-upload',
            inputId: '#realImageUrls',
            boxId: '#realImagePreviewBox',
            imageListRef: function () { return realImageList; },
            setImageList: function (list) { realImageList = list; }
        });

        $(document).on('click', '.delete-img', function () {
            var $item = $(this).closest('.upload-item');
            var url = $item.data('url');
            var inputId = $item.data('input-id');
            var list = getImageListByInputId(inputId).filter(function (item) {
                return item !== url;
            });
            setImageListByInputId(inputId, list);
            $item.remove();
            syncInput(inputId);
        });

        // 支持拖拽调整图片顺序
        $(document).on('dragstart', '.upload-item', function (e) {
            draggingEl = this;
            $(this).addClass('dragging');
            if (e.originalEvent && e.originalEvent.dataTransfer) {
                e.originalEvent.dataTransfer.effectAllowed = 'move';
            }
        });
        $(document).on('dragend', '.upload-item', function () {
            $(this).removeClass('dragging');
            draggingEl = null;
        });
        $(document).on('dragover', '.upload-item', function (e) {
            e.preventDefault();
            if (!draggingEl || draggingEl === this) {
                return;
            }
            if ($(draggingEl).data('input-id') !== $(this).data('input-id')) {
                return;
            }
            var rect = this.getBoundingClientRect();
            var insertBefore = (e.originalEvent.clientX - rect.left) < rect.width / 2;
            if (insertBefore) {
                this.parentNode.insertBefore(draggingEl, this);
            } else {
                this.parentNode.insertBefore(draggingEl, this.nextSibling);
            }
        });
        $(document).on('drop', '.upload-item', function (e) {
            e.preventDefault();
            rebuildImageListFromDom($(this).data('input-id'));
        });

        form.on('submit(submitForm)', function () {
            $.ajax({
                url: '/business/tea/teaSku/save',
                type: 'POST',
                data: $('#editform').serialize(),
                success: function (res) {
                    if (res.code == 200) {
                        window.parent.location.reload();
                    } else {
                        alert(res.msg);
                    }
                }
            });
            return false;
        });

        function initImageGroup(config) {
            var imageUrlsStr = $(config.inputId).val();
            if (imageUrlsStr) {
                try {
                    var imageListTemp = JSON.parse(imageUrlsStr);
                    config.setImageList(imageListTemp);
                    imageListTemp.forEach(function (url) {
                        renderImage(url, config.boxId, config.inputId);
                    });
                } catch (e) {
                    console.error(config.inputId + ' is not valid json');
                }
            }
            syncInput(config.inputId);

            upload.render({
                elem: config.uploadElem,
                url: '/business/upload/file',
                field: 'file',
                multiple: true,
                number: 9,
                acceptMime: 'image/*',
                exts: 'jpg|jpeg|png|gif|webp',
                done: function (res) {
                    if (res.code !== 0) {
                        layer.msg('上传失败');
                        return;
                    }
                    var imageListTemp = config.imageListRef();
                    imageListTemp.push(res.data.src);
                    renderImage(res.data.src, config.boxId, config.inputId);
                    syncInput(config.inputId);
                    layer.msg('上传成功');
                }
            });
        }

        function renderImage(url, boxId, inputId) {
            $(boxId).append(
                '<div class="upload-item" draggable="true" data-url="' + url + '" data-input-id="' + inputId + '">' +
                '   <img src="' + url + '">' +
                '   <div class="delete-img" data-url="' + url + '">×</div>' +
                '</div>'
            );
        }

        function rebuildImageListFromDom(inputId) {
            var imageListTemp = [];
            $(getBoxIdByInputId(inputId) + ' .upload-item').each(function () {
                var url = $(this).data('url');
                if (url) {
                    imageListTemp.push(url);
                }
            });
            setImageListByInputId(inputId, imageListTemp);
            syncInput(inputId);
        }

        function syncInput(inputId) {
            $(inputId).val(JSON.stringify(getImageListByInputId(inputId)));
        }

        function getImageListByInputId(inputId) {
            return inputId === '#realImageUrls' ? realImageList : imageList;
        }

        function setImageListByInputId(inputId, list) {
            if (inputId === '#realImageUrls') {
                realImageList = list;
                return;
            }
            imageList = list;
        }

        function getBoxIdByInputId(inputId) {
            return inputId === '#realImageUrls' ? '#realImagePreviewBox' : '#imagePreviewBox';
        }
    });
</script>
</body>
</html>
