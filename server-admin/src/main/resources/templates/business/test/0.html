<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/common/template :: header(~{::title},~{::link},~{::style})">
    <title>欢迎页</title>
    <style>
        body {
            background-color: #f7f9fc;
        }

        .welcome-wrapper {
            min-height: calc(100vh - 40px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .welcome-content {
            text-align: center;
            padding: 40px;
        }

        .welcome-content img {
            max-width: 420px;
            width: 100%;
            margin-bottom: 30px;
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .welcome-desc {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
        }

        .welcome-tag span {
            display: inline-block;
            padding: 4px 12px;
            margin: 0 6px;
            background-color: #eef4ff;
            color: #5b7cff;
            border-radius: 20px;
            font-size: 12px;
        }
    </style>
</head>

<body class="timo-layout-page">

<div class="welcome-wrapper">
    <div class="welcome-content">

        <!-- 插画 -->
        <img th:src="@{/images/welcome.svg}" alt="welcome">

        <!-- 一句话欢迎语 -->
        <div class="welcome-title">
            欢迎使用后台管理系统
        </div>

        <!-- 副标题 -->
        <div class="welcome-desc">
            一个让后台开发更简单的解决方案
        </div>

        <!-- 标签（可选） -->
        <div class="welcome-tag">
            <span>Spring Boot</span>
            <span>Thymeleaf</span>
            <span>Layui</span>
            <span>Shiro</span>
        </div>

    </div>
</div>

<script th:replace="/common/template :: script"></script>
</body>
</html>
